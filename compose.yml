services:
  server:
    container_name: template-server
    build:
      context: ./server
      network: host
    env_file:
      - path: ./server/.env.local
        required: false
      - path: ./server/.env
        required: false
      - path: ./server/.env.example
        required: true
    environment:
      CORS_ORIGINS: '${DASHBOARD_CORS_ORIGINS:-["http://127.0.0.1:5173","http://localhost:5173"]}'
    ports:
      - "${TEMPLATE_API_PORT:-8000}:8000"
    volumes:
      - ./server:/app
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    container_name: template-web
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        APP_DIR: client/web
    depends_on:
      server:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${TEMPLATE_WEB_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${TEMPLATE_WEB_PORT:-5173}:5173"
    volumes:
      - ./client/web:/workspace/client/web
      - template_workspace_node_modules:/workspace/node_modules
      - template_node_modules:/workspace/client/web/node_modules

volumes:
  template_workspace_node_modules:
  template_node_modules:
