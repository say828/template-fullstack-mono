services:
  mysql:
    image: mysql:8.0.45
    container_name: template-mysql
    environment:
      MYSQL_DATABASE: template
      MYSQL_USER: template
      MYSQL_PASSWORD: template
      MYSQL_ROOT_PASSWORD: template-root
    ports:
      - "${TEMPLATE_DB_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    container_name: template-server
    build:
      context: ./server
      network: host
    env_file:
      - path: ./server/.env.local
        required: false
      - path: ./server/.env
        required: false
      - path: ./server/.env.example
        required: true
    environment:
      DATABASE_URL: ${TEMPLATE_DATABASE_URL:-mysql+pymysql://template:template@mysql:3306/template?charset=utf8mb4}
      CORS_ORIGINS: '${DASHBOARD_CORS_ORIGINS:-["http://127.0.0.1:5173","http://localhost:5173","http://127.0.0.1:5174","http://localhost:5174"]}'
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${TEMPLATE_API_PORT:-8000}:8000"
    volumes:
      - ./server:/app
      - ./server/data/storage:/app/data/storage
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    container_name: template-web
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        APP_DIR: client/web
    depends_on:
      server:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${TEMPLATE_WEB_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${TEMPLATE_WEB_PORT:-5173}:5173"
    volumes:
      - ./client/web:/workspace/client/web
      - template_workspace_node_modules:/workspace/node_modules
      - template_node_modules:/workspace/client/web/node_modules

  admin:
    container_name: template-admin
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        APP_DIR: client/admin
    depends_on:
      server:
        condition: service_started
      web:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${TEMPLATE_ADMIN_WEB_API_BASE_URL:-http://localhost:8000/api/v1}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${TEMPLATE_ADMIN_WEB_PORT:-5174}:5174"
    volumes:
      - ./client/admin:/workspace/client/admin
      - admin_workspace_node_modules:/workspace/node_modules
      - admin_node_modules:/workspace/client/admin/node_modules

volumes:
  mysql_data:
  template_workspace_node_modules:
  template_node_modules:
  admin_workspace_node_modules:
  admin_node_modules:
